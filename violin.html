<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小提琴音符英雄</title>
    <meta name="description" content="小提琴音符识谱小游戏，支持找琴弦和找按指练习。">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background-color: #f0f9ff;
            user-select: none;
            touch-action: manipulation;
        }
        .note-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .btn-bounce:active {
            transform: scale(0.95);
        }
        .correct-flash {
            animation: flash-green 0.5s ease-out;
        }
        .incorrect-flash {
            animation: flash-red 0.5s ease-out;
        }
        @keyframes flash-green {
            0% { background-color: white; }
            50% { background-color: #dcfce7; }
            100% { background-color: white; }
        }
        @keyframes flash-red {
            0% { background-color: white; }
            50% { background-color: #fee2e2; }
            100% { background-color: white; }
        }
        .staff-touch:active {
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-800">

    <!-- 主屏幕 -->
    <div id="home-screen" class="w-full max-w-md text-center space-y-8">
        <div class="space-y-2">
            <h1 class="text-4xl font-bold text-blue-600">小提琴音符英雄 🎻</h1>
            <p class="text-gray-600 text-lg">快乐识谱，轻松练习</p>
        </div>
        
        <div class="flex flex-col gap-4">
            <button onclick="startGame('string')" class="btn-bounce bg-blue-500 hover:bg-blue-600 text-white rounded-3xl p-8 text-2xl font-bold transition-all shadow-lg">
                挑战：找琴弦
                <div class="text-sm font-normal mt-2 opacity-90 text-blue-100">这是第几根弦？</div>
            </button>
            <button onclick="startGame('finger')" class="btn-bounce bg-purple-500 hover:bg-purple-600 text-white rounded-3xl p-8 text-2xl font-bold transition-all shadow-lg">
                挑战：找按指
                <div class="text-sm font-normal mt-2 opacity-90 text-purple-100">琴弦 + 手指 (0-4)</div>
            </button>
        </div>

        <div class="flex items-center justify-center gap-4 text-gray-500">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="sound-toggle" checked class="w-5 h-5 mr-2">
                <span>开启音效</span>
            </label>
        </div>
    </div>

    <!-- 游戏屏幕 -->
    <div id="game-screen" class="hidden w-full max-w-5xl flex flex-col gap-4">
        <!-- 顶部状态栏 -->
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
            <button onclick="showHome()" class="text-gray-400 hover:text-gray-600 font-bold px-2">← 返回</button>
            
            <div class="flex gap-8 items-center">
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold">进度</div>
                    <div id="progress" class="text-2xl font-bold text-slate-600">1 / 10</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold tracking-widest">总得分</div>
                    <div id="score" class="text-4xl font-bold text-blue-600">0</div>
                </div>
            </div>

            <button onclick="resetGame()" class="text-gray-400 hover:text-gray-600 text-sm">重来</button>
        </div>

        <!-- 游戏核心区域 -->
        <div class="flex flex-col lg:flex-row gap-6 items-stretch">
            
            <!-- 左侧：五线谱显示区 -->
            <div id="note-display" class="note-card bg-white rounded-3xl p-6 flex flex-col items-center justify-center min-h-[350px] lg:w-1/3 relative transition-colors duration-300 cursor-pointer staff-touch" onclick="playCurrentNoteSound()">
                <div id="feedback-message" class="absolute top-6 font-bold text-xl opacity-0 pointer-events-none transition-all duration-300 transform -translate-y-2 text-center w-full px-4">提示文字</div>
                
                <svg id="staff-svg" viewBox="0 0 400 200" class="w-full max-w-[320px]">
                    <line x1="20" y1="60" x2="380" y2="60" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="80" x2="380" y2="80" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="100" x2="380" y2="100" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="120" x2="380" y2="120" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="140" x2="380" y2="140" stroke="#333" stroke-width="2" />
                    <g id="note-container"></g>
                </svg>
                <div class="mt-4 text-gray-400 text-xs animate-pulse">点击音符听听声音 🎵</div>
            </div>

            <!-- 右侧：控制器区 -->
            <div class="lg:w-2/3 flex flex-col justify-center">
                
                <!-- 模式1控制器：选琴弦 -->
                <div id="controls-string" class="hidden grid grid-cols-2 gap-4">
                    <button onclick="checkAnswer('G')" class="btn-bounce bg-red-400 hover:bg-red-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md">
                        <span class="text-6xl mb-4">🐘</span>
                        <span class="text-2xl font-bold">大象 (四弦)</span>
                    </button>
                    <button onclick="checkAnswer('D')" class="btn-bounce bg-green-400 hover:bg-green-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md">
                        <span class="text-6xl mb-4">👨</span>
                        <span class="text-2xl font-bold">爸爸 (三弦)</span>
                    </button>
                    <button onclick="checkAnswer('A')" class="btn-bounce bg-blue-400 hover:bg-blue-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md">
                        <span class="text-6xl mb-4">👩</span>
                        <span class="text-2xl font-bold">妈妈 (二弦)</span>
                    </button>
                    <button onclick="checkAnswer('E')" class="btn-bounce bg-yellow-400 hover:bg-yellow-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md">
                        <span class="text-6xl mb-4">🐦</span>
                        <span class="text-2xl font-bold">小鸟 (一弦)</span>
                    </button>
                </div>

                <!-- 模式2控制器：选琴弦+手指 -->
                <div id="controls-finger" class="hidden flex flex-col gap-2">
                    <div class="grid grid-cols-5 gap-2 items-center text-center">
                        <div class="text-xs font-bold text-gray-400">手指</div>
                        <div class="flex flex-col items-center bg-red-100 rounded-t-xl p-1">
                            <span class="text-2xl">🐘</span>
                            <span class="text-[10px] font-bold text-red-600">四弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-green-100 rounded-t-xl p-1">
                            <span class="text-2xl">👨</span>
                            <span class="text-[10px] font-bold text-green-600">三弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-blue-100 rounded-t-xl p-1">
                            <span class="text-2xl">👩</span>
                            <span class="text-[10px] font-bold text-blue-600">二弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-yellow-100 rounded-t-xl p-1">
                            <span class="text-2xl">🐦</span>
                            <span class="text-[10px] font-bold text-yellow-600">一弦</span>
                        </div>
                    </div>
                    
                    <div id="finger-grid" class="flex flex-col gap-2">
                        <!-- 由 JS 动态注入 -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center space-y-6 shadow-2xl">
            <h2 class="text-3xl font-bold text-blue-600">练习结束！ 🎉</h2>
            <div class="space-y-1">
                <p class="text-gray-500">你的得分是</p>
                <p id="final-score" class="text-6xl font-bold text-blue-500">0</p>
            </div>
            <p id="evaluation" class="text-lg font-medium text-gray-600">继续努力哦！</p>
            <button onclick="showHome()" class="w-full bg-blue-500 hover:bg-blue-600 text-white rounded-2xl py-4 text-xl font-bold transition-all shadow-lg">回到首页</button>
        </div>
    </div>

    <script>
        // --- 数据配置 ---
        const STRING_CONFIG = {
            'G': { emoji: '🐘', name: '大象', order: '四弦', color: 'bg-red-400', lightColor: 'bg-red-50' },
            'D': { emoji: '👨', name: '爸爸', order: '三弦', color: 'bg-green-400', lightColor: 'bg-green-50' },
            'A': { emoji: '👩', name: '妈妈', order: '二弦', color: 'bg-blue-400', lightColor: 'bg-blue-50' },
            'E': { emoji: '🐦', name: '小鸟', order: '一弦', color: 'bg-yellow-400', lightColor: 'bg-yellow-50' }
        };

        const FREQUENCIES = {
            'G3': 196.00, 'A3': 220.00, 'B3': 246.94, 'C4': 261.63, 'D4_G': 293.66,
            'D4': 293.66, 'E4': 329.63, 'F#4': 369.99, 'G4': 392.00, 'A4_D': 440.00,
            'A4': 440.00, 'B4': 493.88, 'C#5': 554.37, 'D5': 587.33, 'E5_A': 659.25,
            'E5': 659.25, 'F#5': 739.99, 'G#5': 830.61, 'A5': 880.00, 'B5_E': 987.77
        };

        const NOTES = [
            { id: 'E5', string: 'E', finger: 0, steps: 9 },
            { id: 'F#5', string: 'E', finger: 1, steps: 10 },
            { id: 'G#5', string: 'E', finger: 2, steps: 11 },
            { id: 'A5', string: 'E', finger: 3, steps: 12 },
            { id: 'B5_E', string: 'E', finger: 4, steps: 13 },
            { id: 'A4', string: 'A', finger: 0, steps: 5 },
            { id: 'B4', string: 'A', finger: 1, steps: 6 },
            { id: 'C#5', string: 'A', finger: 2, steps: 7 },
            { id: 'D5', string: 'A', finger: 3, steps: 8 },
            { id: 'E5_A', string: 'A', finger: 4, steps: 9 }, 
            { id: 'D4', string: 'D', finger: 0, steps: 1 },
            { id: 'E4', string: 'D', finger: 1, steps: 2 },
            { id: 'F#4', string: 'D', finger: 2, steps: 3 },
            { id: 'G4', string: 'D', finger: 3, steps: 4 },
            { id: 'A4_D', string: 'D', finger: 4, steps: 5 }, 
            { id: 'G3', string: 'G', finger: 0, steps: -3 },
            { id: 'A3', string: 'G', finger: 1, steps: -2 },
            { id: 'B3', string: 'G', finger: 2, steps: -1 },
            { id: 'C4', string: 'G', finger: 3, steps: 0 },
            { id: 'D4_G', string: 'G', finger: 4, steps: 1 }
        ];

        // --- 游戏状态 ---
        let currentMode = 'string';
        let currentNote = null;
        let score = 0;
        let questionCount = 0;
        const totalQuestions = 10;
        let isProcessing = false;
        let audioCtx = null;
        let gamePlaylist = []; // 存储本轮互不重复的音符

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(freq) {
            if (!document.getElementById('sound-toggle').checked) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        function playCurrentNoteSound() {
            if (currentNote) playNote(FREQUENCIES[currentNote.id]);
        }

        function playFeedbackSound(type) {
            if (!document.getElementById('sound-toggle').checked) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 洗牌算法：打乱数组顺序
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function startGame(mode) {
            currentMode = mode;
            score = 0; 
            questionCount = 0;
            
            // 每一轮开始时，生成一个包含10个不重复音符的播放列表
            // 先打乱整个题库，然后取前10个
            gamePlaylist = shuffle([...NOTES]).slice(0, totalQuestions);
            
            updateUI();
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('result-modal').classList.add('hidden');
            
            if (mode === 'string') {
                document.getElementById('controls-string').classList.remove('hidden');
                document.getElementById('controls-finger').classList.add('hidden');
            } else {
                document.getElementById('controls-string').classList.add('hidden');
                document.getElementById('controls-finger').classList.remove('hidden');
                renderFingerGrid();
            }
            nextQuestion();
        }

        function showHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-modal').classList.add('hidden');
        }

        function renderFingerGrid() {
            const container = document.getElementById('finger-grid');
            container.innerHTML = '';
            const strings = ['G', 'D', 'A', 'E'];
            for (let f = 0; f <= 4; f++) {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-5 gap-2 items-center';
                const fingerLabel = document.createElement('div');
                fingerLabel.className = 'text-center font-bold text-gray-500 text-lg';
                fingerLabel.innerText = `${f}指`;
                row.appendChild(fingerLabel);
                strings.forEach(str => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-bounce bg-white border-2 border-gray-100 rounded-2xl py-5 text-xl font-bold shadow-sm hover:border-blue-200 transition-all';
                    btn.innerText = '●'; 
                    btn.onclick = () => checkAnswer(`${str}${f}`);
                    btn.dataset.ans = `${str}${f}`;
                    btn.classList.add(STRING_CONFIG[str].lightColor);
                    row.appendChild(btn);
                });
                container.appendChild(row);
            }
        }

        function nextQuestion() {
            if (questionCount >= totalQuestions) {
                showResult();
                return;
            }
            
            isProcessing = false;
            // 从播放列表中按顺序取出音符
            currentNote = gamePlaylist[questionCount];
            questionCount++;
            
            updateUI();
            document.getElementById('note-display').classList.remove('correct-flash', 'incorrect-flash');
            document.getElementById('feedback-message').classList.add('opacity-0', '-translate-y-2');
            renderNote(currentNote);
        }

        function renderNote(note) {
            const container = document.getElementById('note-container');
            container.innerHTML = '';
            const stepHeight = 10;
            const baseY = 160; 
            const noteY = baseY - (note.steps * stepHeight);
            
            if (note.steps <= 0) { 
                container.innerHTML += `<line x1="170" y1="160" x2="230" y2="160" stroke="#333" stroke-width="2" />`;
                if (note.steps <= -2) container.innerHTML += `<line x1="170" y1="180" x2="230" y2="180" stroke="#333" stroke-width="2" />`;
            }
            if (note.steps >= 12) container.innerHTML += `<line x1="170" y1="40" x2="230" y2="40" stroke="#333" stroke-width="2" />`;

            const ellipse = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            ellipse.setAttribute("cx", "200");
            ellipse.setAttribute("cy", noteY);
            ellipse.setAttribute("rx", "12");
            ellipse.setAttribute("ry", "8");
            ellipse.setAttribute("fill", "#333");
            ellipse.setAttribute("transform", `rotate(-20, 200, ${noteY})`);
            container.appendChild(ellipse);

            const stem = document.createElementNS("http://www.w3.org/2000/svg", "line");
            const isUp = note.steps < 6;
            stem.setAttribute("x1", isUp ? "211" : "189");
            stem.setAttribute("y1", noteY);
            stem.setAttribute("x2", isUp ? "211" : "189");
            stem.setAttribute("y2", isUp ? noteY - 60 : noteY + 60);
            stem.setAttribute("stroke", "#333");
            stem.setAttribute("stroke-width", "2");
            container.appendChild(stem);
        }

        function checkAnswer(userChoice) {
            if (isProcessing) return;
            isProcessing = true;
            const targetFreq = FREQUENCIES[currentNote.id];
            let isCorrect = false;
            if (currentMode === 'string') {
                const possibleStrings = NOTES.filter(n => FREQUENCIES[n.id] === targetFreq).map(n => n.string);
                isCorrect = possibleStrings.includes(userChoice);
            } else {
                const userString = userChoice.charAt(0);
                const userFinger = parseInt(userChoice.charAt(1));
                const validCombinations = NOTES.filter(n => FREQUENCIES[n.id] === targetFreq);
                isCorrect = validCombinations.some(n => n.string === userString && n.finger === userFinger);
            }
            const display = document.getElementById('note-display');
            const feedback = document.getElementById('feedback-message');
            feedback.classList.remove('opacity-0', '-translate-y-2');
            feedback.classList.add('opacity-100', 'translate-y-0');
            if (isCorrect) {
                score += 10;
                display.classList.add('correct-flash');
                feedback.innerText = "太棒了！✨";
                feedback.className = "absolute top-6 font-bold text-xl text-green-500 transition-all duration-300 w-full text-center";
                playFeedbackSound('success');
            } else {
                display.classList.add('incorrect-flash');
                const conf = STRING_CONFIG[currentNote.string];
                const labelText = `${conf.emoji} ${conf.name} (${conf.order})`;
                feedback.innerText = currentMode === 'string' ? `这是 ${labelText} 哦！` : `这是 ${labelText} 的 ${currentNote.finger} 指！`;
                feedback.className = "absolute top-6 font-bold text-xl text-red-500 transition-all duration-300 w-full text-center";
                highlightCorrect();
                playFeedbackSound('fail');
            }
            updateUI();
            setTimeout(nextQuestion, 1500);
        }

        function highlightCorrect() {
            if (currentMode === 'finger') {
                const targetFreq = FREQUENCIES[currentNote.id];
                const validCombinations = NOTES.filter(n => FREQUENCIES[n.id] === targetFreq);
                validCombinations.forEach(n => {
                    const btn = document.querySelector(`[data-ans="${n.string}${n.finger}"]`);
                    if (btn) {
                        btn.classList.add('ring-8', 'ring-green-400', 'z-10');
                        setTimeout(() => btn.classList.remove('ring-8', 'ring-green-400', 'z-10'), 1200);
                    }
                });
            }
        }

        function showResult() {
            document.getElementById('final-score').innerText = score;
            const eval = document.getElementById('evaluation');
            if (score === 100) eval.innerText = "完美表现！你是音乐天才！🌟";
            else if (score >= 80) eval.innerText = "非常出色！继续加油！👍";
            else if (score >= 60) eval.innerText = "不错哦，多加练习会更棒！😊";
            else eval.innerText = "别灰心，再练习一下吧！💪";
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('progress').innerText = `${Math.min(questionCount, totalQuestions)} / ${totalQuestions}`;
        }

        function resetGame() {
            startGame(currentMode);
        }
    </script>
</body>
</html>
