<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小提琴音符英雄</title>
    <meta name="description" content="小提琴音符识谱小游戏第四版，支持多位置同音按指练习。">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background-color: #f0f9ff;
            user-select: none;
            touch-action: manipulation;
        }
        .note-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .btn-bounce:active {
            transform: scale(0.95);
        }
        .correct-flash {
            animation: flash-green 0.5s ease-out;
        }
        .incorrect-flash {
            animation: flash-red 0.5s ease-out;
        }
        @keyframes flash-green {
            0% { background-color: white; }
            50% { background-color: #dcfce7; }
            100% { background-color: white; }
        }
        @keyframes flash-red {
            0% { background-color: white; }
            50% { background-color: #fee2e2; }
            100% { background-color: white; }
        }
        .staff-touch:active {
            background-color: #f8fafc;
        }
        /* 被选中的正确按钮样式 */
        .button-selected-correct {
            border-color: #10b981 !important; /* green-500 */
            background-color: #ecfdf5 !important;
            box-shadow: 0 0 0 4px #10b981 inset !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-800">

    <!-- 主屏幕 -->
    <div id="home-screen" class="w-full max-w-md text-center space-y-8">
        <div class="space-y-2">
            <h1 class="text-4xl font-bold text-blue-600">小提琴音符英雄 🎻</h1>
            <p class="text-gray-600 text-lg">快乐识谱，同音通关！</p>
        </div>
        
        <div class="flex flex-col gap-4">
            <button onclick="startGame('string')" class="btn-bounce bg-blue-500 hover:bg-blue-600 text-white rounded-3xl p-8 text-2xl font-bold transition-all shadow-lg">
                挑战：找琴弦
                <div class="text-sm font-normal mt-2 opacity-90 text-blue-100">这是第几根弦？</div>
            </button>
            <button onclick="startGame('finger')" class="btn-bounce bg-purple-500 hover:bg-purple-600 text-white rounded-3xl p-8 text-2xl font-bold transition-all shadow-lg">
                挑战：找按指
                <div class="text-sm font-normal mt-2 opacity-90 text-purple-100">Mi/La/Re 需要找两个位置哦！</div>
            </button>
        </div>

        <div class="flex items-center justify-center gap-4 text-gray-500">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="sound-toggle" checked class="w-5 h-5 mr-2">
                <span>开启音效</span>
            </label>
        </div>
    </div>

    <!-- 游戏屏幕 -->
    <div id="game-screen" class="hidden w-full max-w-6xl flex flex-col gap-4">
        <!-- 顶部状态栏 -->
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
            <button onclick="showHome()" class="text-gray-400 hover:text-gray-600 font-bold px-2">← 返回</button>
            
            <div class="flex gap-8 items-center">
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold">进度</div>
                    <div id="progress" class="text-2xl font-bold text-slate-600">1 / 10</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-gray-400 uppercase font-bold tracking-widest">总得分</div>
                    <div id="score" class="text-4xl font-bold text-blue-600">0</div>
                </div>
            </div>

            <button onclick="resetGame()" class="text-gray-400 hover:text-gray-600 text-sm font-bold">重来</button>
        </div>

        <!-- 游戏核心区域 -->
        <div class="flex flex-col lg:flex-row gap-6 items-stretch">
            
            <!-- 左侧：五线谱显示区 -->
            <div id="note-display" class="note-card bg-white rounded-3xl p-6 flex flex-col items-center justify-center min-h-[350px] lg:w-1/3 relative transition-colors duration-300 cursor-pointer staff-touch" onclick="playCurrentNoteSound()">
                <div id="feedback-message" class="absolute top-6 font-bold text-xl opacity-0 pointer-events-none transition-all duration-300 transform -translate-y-2 text-center w-full px-4">提示文字</div>
                
                <svg id="staff-svg" viewBox="0 0 400 200" class="w-full max-w-[320px]">
                    <line x1="20" y1="60" x2="380" y2="60" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="80" x2="380" y2="80" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="100" x2="380" y2="100" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="120" x2="380" y2="120" stroke="#333" stroke-width="2" />
                    <line x1="20" y1="140" x2="380" y2="140" stroke="#333" stroke-width="2" />
                    <g id="note-container"></g>
                </svg>
                <div class="mt-4 text-gray-400 text-xs animate-pulse">点击音符听听声音 🎵</div>
            </div>

            <!-- 右侧：控制器区 -->
            <div class="lg:w-2/3 flex flex-col justify-center">
                
                <!-- 模式1控制器：选琴弦 -->
                <div id="controls-string" class="hidden grid grid-cols-2 gap-4">
                    <button id="btn-string-G" onclick="checkAnswer('G')" class="btn-bounce bg-green-400 hover:bg-green-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md transition-all">
                        <span class="text-6xl mb-4">🐻</span>
                        <span class="text-2xl font-bold">大熊 (四弦)</span>
                    </button>
                    <button id="btn-string-D" onclick="checkAnswer('D')" class="btn-bounce bg-red-400 hover:bg-red-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md transition-all">
                        <span class="text-6xl mb-4">👨</span>
                        <span class="text-2xl font-bold">爸爸 (三弦)</span>
                    </button>
                    <button id="btn-string-A" onclick="checkAnswer('A')" class="btn-bounce bg-blue-400 hover:bg-blue-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md transition-all">
                        <span class="text-6xl mb-4">👩</span>
                        <span class="text-2xl font-bold">妈妈 (二弦)</span>
                    </button>
                    <button id="btn-string-E" onclick="checkAnswer('E')" class="btn-bounce bg-yellow-400 hover:bg-yellow-500 text-white rounded-2xl py-12 flex flex-col items-center shadow-md transition-all">
                        <span class="text-6xl mb-4">🐦</span>
                        <span class="text-2xl font-bold">小鸟 (一弦)</span>
                    </button>
                </div>

                <!-- 模式2控制器：纵向网格 -->
                <div id="controls-finger" class="hidden flex flex-col gap-2">
                    <div class="grid grid-cols-5 gap-2 items-center text-center">
                        <div class="text-xs font-bold text-gray-400">手指</div>
                        <div class="flex flex-col items-center bg-green-100 rounded-t-xl p-1">
                            <span class="text-2xl">🐻</span>
                            <span class="text-[10px] font-bold text-green-600">四弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-red-100 rounded-t-xl p-1">
                            <span class="text-2xl">👨</span>
                            <span class="text-[10px] font-bold text-red-600">三弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-blue-100 rounded-t-xl p-1">
                            <span class="text-2xl">👩</span>
                            <span class="text-[10px] font-bold text-blue-600">二弦</span>
                        </div>
                        <div class="flex flex-col items-center bg-yellow-100 rounded-t-xl p-1">
                            <span class="text-2xl">🐦</span>
                            <span class="text-[10px] font-bold text-yellow-600">一弦</span>
                        </div>
                    </div>
                    
                    <div id="finger-grid" class="flex flex-col gap-2">
                        <!-- 由 JS 动态注入 -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div id="result-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center space-y-6 shadow-2xl">
            <h2 class="text-3xl font-bold text-blue-600">练习结束！ 🎉</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-50 rounded-2xl p-4">
                    <p class="text-gray-500 text-sm">得分</p>
                    <p id="final-score" class="text-4xl font-bold text-blue-500">0</p>
                </div>
                <div class="bg-orange-50 rounded-2xl p-4">
                    <p class="text-gray-500 text-sm">总用时</p>
                    <p id="final-time" class="text-2xl font-bold text-orange-500">0秒</p>
                </div>
            </div>
            <p id="evaluation" class="text-lg font-medium text-gray-600">继续努力哦！</p>
            <button onclick="showHome()" class="w-full bg-blue-500 hover:bg-blue-600 text-white rounded-2xl py-4 text-xl font-bold transition-all shadow-lg">回到首页</button>
        </div>
    </div>

    <script>
        // --- 核心配置 ---
        const STRING_CONFIG = {
            'G': { emoji: '🐻', name: '大熊', order: '四弦', color: 'bg-green-400', lightColor: 'bg-green-50' },
            'D': { emoji: '👨', name: '爸爸', order: '三弦', color: 'bg-red-400', lightColor: 'bg-red-50' },
            'A': { emoji: '👩', name: '妈妈', order: '二弦', color: 'bg-blue-400', lightColor: 'bg-blue-50' },
            'E': { emoji: '🐦', name: '小鸟', order: '一弦', color: 'bg-yellow-400', lightColor: 'bg-yellow-50' }
        };

        const FREQS = {
            G3: 196.00, A3: 220.00, B3: 246.94, C4: 261.63, 
            D4: 293.66, E4: 329.63, FS4: 369.99, G4: 392.00, 
            A4: 440.00, B4: 493.88, CS5: 554.37, D5: 587.33, 
            E5: 659.25, FS5: 739.99, GS5: 830.61, A5: 880.00, B5: 987.77
        };

        // 数据库
        const NOTES_DATABASE = [
            { id: 'G3', string: 'G', finger: 0, steps: -3, freq: FREQS.G3 },
            { id: 'A3', string: 'G', finger: 1, steps: -2, freq: FREQS.A3 },
            { id: 'B3', string: 'G', finger: 2, steps: -1, freq: FREQS.B3 },
            { id: 'C4', string: 'G', finger: 3, steps: 0,  freq: FREQS.C4 },
            { id: 'D4_G', string: 'G', finger: 4, steps: 1,  freq: FREQS.D4 },
            { id: 'D4', string: 'D', finger: 0, steps: 1,  freq: FREQS.D4 },
            { id: 'E4', string: 'D', finger: 1, steps: 2,  freq: FREQS.E4 },
            { id: 'FS4', string: 'D', finger: 2, steps: 3,  freq: FREQS.FS4 },
            { id: 'G4', string: 'D', finger: 3, steps: 4,  freq: FREQS.G4 },
            { id: 'A4_D', string: 'D', finger: 4, steps: 5,  freq: FREQS.A4 },
            { id: 'A4', string: 'A', finger: 0, steps: 5,  freq: FREQS.A4 },
            { id: 'B4', string: 'A', finger: 1, steps: 6,  freq: FREQS.B4 },
            { id: 'CS5', string: 'A', finger: 2, steps: 7,  freq: FREQS.CS5 },
            { id: 'D5', string: 'A', finger: 3, steps: 8,  freq: FREQS.D5 },
            { id: 'E5_A', string: 'A', finger: 4, steps: 9,  freq: FREQS.E5 },
            { id: 'E5', string: 'E', finger: 0, steps: 9,  freq: FREQS.E5 },
            { id: 'FS5', string: 'E', finger: 1, steps: 10, freq: FREQS.FS5 },
            { id: 'GS5', string: 'E', finger: 2, steps: 11, freq: FREQS.GS5 },
            { id: 'A5', string: 'E', finger: 3, steps: 12, freq: FREQS.A5 },
            { id: 'B5_E', string: 'E', finger: 4, steps: 13, freq: FREQS.B5 }
        ];

        // --- 游戏状态 ---
        let currentMode = 'string';
        let currentNote = null;
        let score = 0;
        let questionCount = 0;
        const totalQuestions = 10;
        let isProcessing = false;
        let audioCtx = null;
        let playlist = [];
        let startTime = 0;
        
        // 用于存储本题已点击的正确位置的键名
        let correctAnswersSelected = new Set();

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(freq) {
            if (!document.getElementById('sound-toggle').checked) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        function playCurrentNoteSound() {
            if (currentNote) playNote(currentNote.freq);
        }

        function playUIFeedback(success) {
            if (!document.getElementById('sound-toggle').checked) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (success) {
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            }
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function startGame(mode) {
            currentMode = mode;
            score = 0; questionCount = 0;
            startTime = Date.now();
            playlist = [...NOTES_DATABASE].sort(() => Math.random() - 0.5).slice(0, totalQuestions);
            updateUI();
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('result-modal').classList.add('hidden');
            if (mode === 'string') {
                document.getElementById('controls-string').classList.remove('hidden');
                document.getElementById('controls-finger').classList.add('hidden');
            } else {
                document.getElementById('controls-string').classList.add('hidden');
                document.getElementById('controls-finger').classList.remove('hidden');
                renderFingerGrid();
            }
            nextQuestion();
        }

        function showHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-modal').classList.add('hidden');
        }

        function renderFingerGrid() {
            const container = document.getElementById('finger-grid');
            container.innerHTML = '';
            const strings = ['G', 'D', 'A', 'E'];
            for (let f = 0; f <= 4; f++) {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-5 gap-2 items-center';
                const label = document.createElement('div');
                label.className = 'text-center font-bold text-gray-500 text-lg';
                label.innerText = `${f}指`;
                row.appendChild(label);
                strings.forEach(str => {
                    const btn = document.createElement('button');
                    btn.id = `btn-${str}${f}`;
                    btn.className = 'btn-bounce bg-white border-2 border-gray-100 rounded-2xl py-5 text-xl font-bold shadow-sm hover:border-blue-200 transition-all';
                    btn.innerText = '●';
                    btn.onclick = () => checkAnswer(`${str}${f}`);
                    btn.dataset.ans = `${str}${f}`;
                    btn.classList.add(STRING_CONFIG[str].lightColor);
                    row.appendChild(btn);
                });
                container.appendChild(row);
            }
        }

        function nextQuestion() {
            if (questionCount >= totalQuestions) {
                showResult();
                return;
            }
            isProcessing = false;
            correctAnswersSelected.clear();
            currentNote = playlist[questionCount];
            questionCount++;
            updateUI();
            
            // 重置所有按钮状态
            document.querySelectorAll('.btn-bounce').forEach(b => {
                b.classList.remove('button-selected-correct');
                b.style.borderColor = '';
            });
            document.getElementById('note-display').classList.remove('correct-flash', 'incorrect-flash');
            document.getElementById('feedback-message').classList.add('opacity-0', '-translate-y-2');
            
            renderStaff(currentNote);
        }

        function renderStaff(note) {
            const container = document.getElementById('note-container');
            container.innerHTML = '';
            const stepH = 10;
            const baseY = 160; 
            const noteY = baseY - (note.steps * stepH);
            if (note.steps <= 0) { 
                container.innerHTML += `<line x1="170" y1="160" x2="230" y2="160" stroke="#333" stroke-width="2" />`;
                if (note.steps <= -2) container.innerHTML += `<line x1="170" y1="180" x2="230" y2="180" stroke="#333" stroke-width="2" />`;
            }
            if (note.steps >= 12) container.innerHTML += `<line x1="170" y1="40" x2="230" y2="40" stroke="#333" stroke-width="2" />`;
            const ell = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            ell.setAttribute("cx", "200"); ell.setAttribute("cy", noteY);
            ell.setAttribute("rx", "12"); ell.setAttribute("ry", "8");
            ell.setAttribute("fill", "#333");
            ell.setAttribute("transform", `rotate(-20, 200, ${noteY})`);
            container.appendChild(ell);
            const stem = document.createElementNS("http://www.w3.org/2000/svg", "line");
            const up = note.steps < 6;
            stem.setAttribute("x1", up ? "211" : "189"); stem.setAttribute("y1", noteY);
            stem.setAttribute("x2", up ? "211" : "189"); stem.setAttribute("y2", up ? noteY - 60 : noteY + 60);
            stem.setAttribute("stroke", "#333"); stem.setAttribute("stroke-width", "2");
            container.appendChild(stem);
        }

        function checkAnswer(userChoice) {
            if (isProcessing) return;

            const targetFreq = currentNote.freq;
            // 找出所有能发出这个频率的 [弦, 手指] 组合
            const allValidSet = NOTES_DATABASE.filter(n => Math.abs(n.freq - targetFreq) < 0.1);
            
            let isChoiceCorrect = false;
            let choiceKey = ""; // 用于唯一标识按钮

            if (currentMode === 'string') {
                isChoiceCorrect = allValidSet.some(n => n.string === userChoice);
                choiceKey = userChoice;
            } else {
                const uStr = userChoice.charAt(0);
                const uFin = parseInt(userChoice.charAt(1));
                isChoiceCorrect = allValidSet.some(n => n.string === uStr && n.finger === uFin);
                choiceKey = userChoice;
            }

            const feedback = document.getElementById('feedback-message');
            feedback.classList.remove('opacity-0', '-translate-y-2');
            feedback.classList.add('opacity-100', 'translate-y-0');

            if (isChoiceCorrect) {
                if (correctAnswersSelected.has(choiceKey)) return;
                
                correctAnswersSelected.add(choiceKey);
                
                // 变亮视觉反馈
                const btnId = currentMode === 'string' ? `btn-string-${choiceKey}` : `btn-${choiceKey}`;
                const btn = document.getElementById(btnId);
                if (btn) btn.classList.add('button-selected-correct');

                // 检查该音符在该模式下有多少个不重复的正确点击目标
                const uniqueValidKeys = new Set();
                allValidSet.forEach(n => {
                    uniqueValidKeys.add(currentMode === 'string' ? n.string : `${n.string}${n.finger}`);
                });

                if (correctAnswersSelected.size < uniqueValidKeys.size) {
                    // 还没找齐（Mi/La/Re 这种需要找两次的情况）
                    feedback.innerText = "还有一个位置哦！🔍";
                    feedback.className = "absolute top-6 font-bold text-xl text-blue-500 transition-all duration-300 w-full text-center";
                    playUIFeedback(true);
                } else {
                    // 找齐了
                    isProcessing = true;
                    score += 10;
                    document.getElementById('note-display').classList.add('correct-flash');
                    feedback.innerText = "全部找对啦！太棒了！✨";
                    feedback.className = "absolute top-6 font-bold text-xl text-green-500 transition-all duration-300 w-full text-center";
                    playUIFeedback(true);
                    updateUI();
                    setTimeout(nextQuestion, 1500);
                }
            } else {
                // 答错了
                isProcessing = true;
                document.getElementById('note-display').classList.add('incorrect-flash');
                const conf = STRING_CONFIG[currentNote.string];
                feedback.innerText = currentMode === 'string' ? `选 ${conf.name} 哦！` : `可以按 ${conf.emoji}${conf.name}的${currentNote.finger}指！`;
                feedback.className = "absolute top-6 font-bold text-xl text-red-500 transition-all duration-300 w-full text-center";
                
                // 高亮所有正确答案
                allValidSet.forEach(n => {
                    const ansKey = currentMode === 'string' ? `btn-string-${n.string}` : `btn-${n.string}${n.finger}`;
                    const b = document.getElementById(ansKey);
                    if (b) {
                        b.style.borderColor = '#10b981';
                        b.classList.add('ring-8', 'ring-green-400', 'z-10');
                        setTimeout(() => b.classList.remove('ring-8', 'ring-green-400', 'z-10'), 1200);
                    }
                });
                playUIFeedback(false);
                updateUI();
                setTimeout(nextQuestion, 1500);
            }
        }

        function showResult() {
            const duration = Math.floor((Date.now() - startTime) / 1000);
            const timeStr = duration >= 60 ? `${Math.floor(duration/60)}分${duration%60}秒` : `${duration}秒`;
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-time').innerText = timeStr;
            const eval = document.getElementById('evaluation');
            if (score === 100) eval.innerText = "你是未来的演奏家！👑";
            else if (score >= 80) eval.innerText = "已经很熟练了，再接再厉！🚀";
            else eval.innerText = "多练习一下，会越来越快的！💪";
            document.getElementById('result-modal').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('progress').innerText = `${Math.min(questionCount, totalQuestions)} / ${totalQuestions}`;
        }

        function resetGame() { startGame(currentMode); }
    </script>
</body>
</html>
